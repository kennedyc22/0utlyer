name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    name: lint / typecheck / test / build / e2e / lhci
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright e2e (includes a11y-strict, keyboard-nav, reduced-motion, colour-deficiency, form-integrity, schema-validation, link-integrity, visual regression)
        run: npm run test:e2e:ci

      - name: Upload QA artefacts (a11y reports, colour-deficiency screenshots, focus states, schema dumps, link report)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-reports
          path: |
            tests/reports/**
            tests/visual/__snapshots__/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Lighthouse CI
        run: npm run lhci:ci
